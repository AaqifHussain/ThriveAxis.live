<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThriveAxis - Coming Soon</title>
    <link rel="icon" type="image/x-icon" href="favicon.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }
        
        .hero-section {
            height: 100vh;
            background: 
                linear-gradient(rgba(0, 21, 41, 0.65), rgba(0, 21, 41, 0.75)),
                url('https://images.unsplash.com/photo-1556761175-b413da4baf72?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        
        .logo-container {
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }
        
        .logo-wrapper {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 15px;
            position: relative;
        }
        
        .logo-wrapper:before {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #d4af37, #f7ef8a, #d4af37);
            z-index: -1;
            animation: rotate 5s linear infinite;
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }
        
        .message {
            max-width: 800px;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }
        
        .message h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 300;
            line-height: 1.2;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }
        
        .message p {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.6;
            color: #e6e6e6;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
        }
        
        .gold-accent {
            color: #d4af37;
            font-weight: 500;
        }
        
        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .circle-1 {
            width: 100px;
            height: 100px;
            top: 15%;
            left: 10%;
            animation: pulse 8s infinite;
        }
        
        .circle-2 {
            width: 150px;
            height: 150px;
            bottom: 20%;
            right: 10%;
            animation: pulse 10s infinite 1s;
        }
        
        .circle-3 {
            width: 70px;
            height: 70px;
            top: 60%;
            left: 15%;
            animation: pulse 7s infinite 0.5s;
        }
        
        .circle-4 {
            width: 120px;
            height: 120px;
            bottom: 30%;
            right: 20%;
            animation: pulse 9s infinite 1.5s;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.6;
            }
            100% {
                transform: scale(1);
                opacity: 0.3;
            }
        }
        
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .message h1 {
                font-size: 2.5rem;
            }
            
            .message p {
                font-size: 1.2rem;
            }
            
            .logo-wrapper {
                width: 160px;
                height: 160px;
            }
        }
        
        @media (max-width: 480px) {
            .message h1 {
                font-size: 2rem;
            }
            
            .message p {
                font-size: 1rem;
            }
            
            .logo-wrapper {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="decoration">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="circle circle-4"></div>
        </div>
        
        <div class="logo-container">
            <div class="logo-wrapper">
                <img src="logo-removebg.png" alt="ThriveAxis Logo">
            </div>
        </div>
        
        <div class="message">
            <h1>Your Wait Has <span class="gold-accent">Meaning</span></h1>
            <p>We're crafting something extraordinary for you. Stay connected as we prepare to launch a transformative experience that will elevate your journey to new heights.</p>
        </div>
    </section>
</body>

</html>
